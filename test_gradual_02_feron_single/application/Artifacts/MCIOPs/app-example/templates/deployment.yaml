apiVersion: v1
kind: Service
metadata:
  name: example-app-service
  labels:
    app_matcher: example-app
spec:
  type: NodePort
  selector:
    app_matcher: example-app
  ports:
    - name: iperf3-tcp
      port: 5201
      targetPort: 5201
      nodePort: {{ .Values.service.iperfTcpNodePort }}
      protocol: TCP
    - name: iperf3-udp
      port: 5201
      targetPort: 5201
      nodePort: {{ .Values.service.iperfUdpNodePort }}
      protocol: UDP
    - name: udp-ping
      port: 1234
      targetPort: 1234
      nodePort: {{ .Values.service.udpPingNodePort }}
      protocol: UDP
    - name: owamp
      port: 861
      targetPort: 861
      nodePort: {{ .Values.service.owampNodePort }}
      protocol: TCP
    - name: twamp
      port: 862
      targetPort: 862
      nodePort: {{ .Values.service.twampNodePort }}
      protocol: TCP
    - name: pscheduler
      port: 8760
      targetPort: 8760
      nodePort: {{ .Values.service.pschedulerNodePort }}
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: example-app
  labels:
    app_matcher: example-app
spec:
  replicas: 1
  serviceName: "example-app-service"
  selector:
    matchLabels:
      app_matcher: example-app
  template:
    metadata:
      labels:
        app_matcher: example-app
    spec:
      containers:
        - name: example-app
          image: {{ index .Values "image" "repository" }}:{{ index .Values "image" "tag" }}
          imagePullPolicy: {{ index .Values "image" "pullPolicy" }}
          ports:
            - name: iperf3-tcp
              containerPort: 5201
              protocol: TCP
            - name: iperf3-udp
              containerPort: 5201
              protocol: UDP
            - name: udp-ping
              containerPort: 1234
              protocol: UDP
            - name: owamp
              containerPort: 861
              protocol: TCP
            - name: twamp
              containerPort: 862
              protocol: TCP
            - name: pscheduler
              containerPort: 8760
              protocol: TCP
