apiVersion: apps/v1
kind: Deployment
metadata:
  name: qoscope-measurement-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qoscope-measurement-tools
  template:
    metadata:
      labels:
        app: qoscope-measurement-tools
    spec:
      containers:
        - name: measurement-tools
          image: "{{ .Values.images.measurementTools }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 5201
              protocol: TCP
            - containerPort: 5201
              protocol: UDP
            - containerPort: 1234
              protocol: UDP

---
apiVersion: v1
kind: Service
metadata:
  name: qoscope-measurement-tools
spec:
  type: NodePort
  selector:
    app: qoscope-measurement-tools
  ports:
    - name: iperf-tcp
      protocol: TCP
      port: 5201
      targetPort: 5201
      nodePort: {{ .Values.services.iperfNodePortTcp }}

    - name: iperf-udp
      protocol: UDP
      port: 5201
      targetPort: 5201
      nodePort: {{ .Values.services.iperfNodePortUdp }}

    - name: udp-ping
      protocol: UDP
      port: 1234
      targetPort: 1234
      nodePort: {{ .Values.services.udpPingNodePort }}
