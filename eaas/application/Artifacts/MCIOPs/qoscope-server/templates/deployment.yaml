apiVersion: apps/v1
kind: Deployment
metadata:
  name: qoscope-measurement-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qoscope-measurement-tools
  template:
    metadata:
      labels:
        app: qoscope-measurement-tools
    spec:
      containers:
        - name: measurement-tools
          image: "{{ .Values.images.measurementTools }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 5201
              protocol: TCP
            - containerPort: 5201
              protocol: UDP
            - containerPort: 1234
              protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: qoscope-measurement-tools
spec:
  type: NodePort
  selector:
    app: qoscope-measurement-tools
  ports:
    - name: iperf-tcp
      port: 5201
      targetPort: 5201
      nodePort: {{ .Values.services.iperfNodePortTcp }}
      protocol: TCP
    - name: iperf-udp
      port: 5201
      targetPort: 5201
      nodePort: {{ .Values.services.iperfNodePortUdp }}
      protocol: UDP
    - name: udpping
      port: 1234
      targetPort: 1234
      nodePort: {{ .Values.services.udpPingNodePort }}
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qoscope-nanomq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qoscope-nanomq
  template:
    metadata:
      labels:
        app: qoscope-nanomq
    spec:
      containers:
        - name: nanomq
          image: "{{ .Values.images.nanomq }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 1883
            - containerPort: 8883
---
apiVersion: v1
kind: Service
metadata:
  name: qoscope-nanomq
spec:
  type: NodePort
  selector:
    app: qoscope-nanomq
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
      nodePort: {{ .Values.services.mqttNodePort }}
      protocol: TCP
    - name: mqtts
      port: 8883
      targetPort: 8883
      nodePort: {{ .Values.services.mqttsNodePort }}
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qoscope-server-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qoscope-server-stream
  template:
    metadata:
      labels:
        app: qoscope-server-stream
    spec:
      containers:
        - name: server-stream
          image: "{{ .Values.images.serverStream }}"
          imagePullPolicy: Always
          env:
            - name: ENV_SERVER_IP
              value: "{{ .Values.video.sourceIP }}"
            - name: ENV_SERVER_PORT
              value: "{{ .Values.video.sourcePort }}"
